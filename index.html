<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏆 家事單字決鬥王 v4.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@500;600;700&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#1a1033; --bg2:#0e0820;
  --blue:#3da9ff; --blue-glow:#8fd3ff;
  --pink:#ff5fa2; --pink-glow:#ffb3d4;
  --gold:#ffd24a; --gold-2:#ff9d2e;
  --green:#46e08a; --red:#ff4d5e;
  --ink:#f6f1ff; --muted:#b9a9e0;
  --panel:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.14);
  --pixel:'Press Start 2P', monospace;
  --body:'Fredoka','Noto Sans TC', sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; font-family:var(--body); color:var(--ink);
  background:
    radial-gradient(120% 70% at 50% -10%, #3a2168 0%, transparent 55%),
    radial-gradient(120% 90% at 0% 100%, rgba(61,169,255,.18) 0%, transparent 50%),
    radial-gradient(120% 90% at 100% 100%, rgba(255,95,162,.18) 0%, transparent 50%),
    linear-gradient(160deg,var(--bg0),var(--bg2));
  background-attachment:fixed; min-height:100%;
  display:flex; justify-content:center;
  padding:10px 10px 24px;
}
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.45;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:34px 34px;
  -webkit-mask-image:radial-gradient(120% 80% at 50% 25%,#000 30%,transparent 90%);
  mask-image:radial-gradient(120% 80% at 50% 25%,#000 30%,transparent 90%);
}
.wrap{position:relative; z-index:1; width:100%; max-width:480px;}

/* Title */
.titlebar{text-align:center; margin:2px 0 10px;}
.titlebar h1{
  font-family:var(--pixel); font-size:clamp(13px,4.8vw,18px); line-height:1.7; margin:0;
  color:var(--gold); text-shadow:0 0 6px rgba(255,210,74,.7),2px 2px 0 var(--gold-2),4px 4px 0 #6a3d00;
}
.titlebar .sub{font-family:var(--pixel); font-size:7px; color:var(--muted); margin-top:6px; letter-spacing:1px;}

/* Arena */
.arena{
  position:relative; border-radius:20px; padding:12px;
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  border:2px solid var(--line);
  box-shadow:0 16px 40px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.12);
}
.arena.shake{animation:shake .38s;}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,2px)}40%{transform:translate(5px,-3px)}60%{transform:translate(-4px,2px)}80%{transform:translate(4px,1px)}}

.fighters{display:grid; grid-template-columns:1fr auto 1fr; gap:6px; align-items:stretch;}
.vs{align-self:center; font-family:var(--pixel); font-size:clamp(12px,4.5vw,18px); color:var(--gold);
  text-shadow:0 0 8px var(--gold-2),2px 2px 0 #6a3d00; transform:rotate(-8deg); animation:vspulse 1.6s ease-in-out infinite;}
@keyframes vspulse{50%{transform:rotate(-8deg) scale(1.18); filter:brightness(1.3)}}

.fighter{
  position:relative; border-radius:16px; padding:10px 8px 12px;
  background:var(--panel); border:2px solid var(--line);
  display:flex; flex-direction:column; align-items:center;
  transition:transform .25s,box-shadow .25s,border-color .25s,filter .25s;
}
.avatar{
  width:clamp(64px,21vw,92px); height:clamp(64px,21vw,92px); border-radius:50%;
  object-fit:cover; object-position:center top; border:3px solid var(--line);
  background:#2a1a4d; filter:drop-shadow(0 5px 7px rgba(0,0,0,.5));
}
.fighter.A .avatar{border-color:var(--blue);}
.fighter.B .avatar{border-color:var(--pink);}
.nm{font-family:var(--pixel); font-size:10px; margin:7px 0 1px; letter-spacing:1px;}
.fighter.A .nm{color:var(--blue-glow);} .fighter.B .nm{color:var(--pink-glow);}
.school{font-size:11px; color:var(--muted); text-align:center; line-height:1.3; min-height:28px;}
.score-lbl{font-family:var(--pixel); font-size:7px; color:var(--muted); margin-top:8px;}
.score{font-family:var(--pixel); font-size:clamp(24px,9vw,38px); line-height:1.1; margin-top:3px;
  text-shadow:0 0 8px rgba(0,0,0,.5); transition:transform .15s;}
.score.pos{color:var(--green);} .score.neg{color:var(--red);} .score.zero{color:var(--ink);}
.score.bump{animation:bump .3s;}
@keyframes bump{40%{transform:scale(1.4)}}

/* active glow */
.fighter.active.A{border-color:var(--blue); box-shadow:0 0 0 2px var(--blue),0 0 24px rgba(61,169,255,.5); transform:translateY(-3px) scale(1.02);}
.fighter.active.B{border-color:var(--pink); box-shadow:0 0 0 2px var(--pink),0 0 24px rgba(255,95,162,.5); transform:translateY(-3px) scale(1.02);}
.fighter:not(.active){filter:saturate(.75) brightness(.85);}
.fighter.active .avatar{animation:bob 1.1s ease-in-out infinite;}
@keyframes bob{50%{transform:translateY(-5px)}}
.fighter.correct .avatar{animation:cheer .5s;}
@keyframes cheer{30%{transform:translateY(-10px) scale(1.1) rotate(-4deg)}60%{transform:translateY(-4px) rotate(3deg)}}
.fighter.wrongf .avatar{animation:nono .45s;}
@keyframes nono{25%{transform:translateX(-6px) rotate(-5deg)}75%{transform:translateX(6px) rotate(5deg)}}

/* floating +1 / -1 */
.fx{position:absolute; left:50%; top:34%; transform:translateX(-50%); pointer-events:none; z-index:6;}
.fx .pop{font-family:var(--pixel); font-size:22px; animation:floatUp 1s forwards; text-shadow:0 0 8px #000;}
.fx .pop.up{color:var(--green);} .fx .pop.down{color:var(--red);}
@keyframes floatUp{0%{opacity:0;transform:translate(-50%,8px) scale(.6)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-44px) scale(1)}}

/* Question */
.qcard{margin-top:12px; border-radius:16px; padding:13px 11px;
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
  border:2px solid var(--line); box-shadow:inset 0 1px 0 rgba(255,255,255,.12);}
.progress{display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:6px;}
.progress .num{font-family:var(--pixel); font-size:8px; color:var(--muted); letter-spacing:1px;}
.pips{display:flex; gap:3px; flex-wrap:wrap; justify-content:center; max-width:240px;}
.pip{width:7px; height:7px; border-radius:50%; background:#4a3a6a; transition:.2s;}
.pip.done{background:var(--gold);}
.pip.now{background:var(--gold); box-shadow:0 0 8px var(--gold); transform:scale(1.5);}
.turn-tag{text-align:center; font-size:13px; margin:4px 0 2px; color:var(--muted);}
.turn-tag b.A{color:var(--blue-glow);} .turn-tag b.B{color:var(--pink-glow);}
.word{text-align:center; font-weight:700; font-size:clamp(32px,11vw,52px); line-height:1.1; letter-spacing:1px;
  margin:6px 0 4px; word-break:break-word; text-shadow:0 3px 10px rgba(0,0,0,.5); animation:wordIn .32s;}
@keyframes wordIn{0%{opacity:0;transform:translateY(10px) scale(.93)}100%{opacity:1}}
.timer{height:7px; border-radius:6px; background:rgba(0,0,0,.3); overflow:hidden; margin:6px auto 12px; max-width:380px;}
.timer.hidden{display:none;}
.timerfill{height:100%; width:100%; background:linear-gradient(90deg,var(--green),var(--gold)); border-radius:6px;}
.timerfill.run{animation:drain linear forwards;}
@keyframes drain{from{width:100%}to{width:0%}}
.choices{display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:440px; margin:0 auto;}
.choice{font-family:var(--body); font-weight:700; font-size:clamp(16px,4.8vw,20px);
  min-height:56px; padding:14px 8px; border-radius:13px; border:2px solid var(--line); cursor:pointer;
  background:linear-gradient(180deg,#fff,#e9e3ff); color:#2a1a4d;
  box-shadow:0 5px 0 #b9a9e0,0 8px 12px rgba(0,0,0,.3);
  transition:transform .08s,box-shadow .08s,filter .12s; user-select:none;}
.choice:active{transform:translateY(4px); box-shadow:0 1px 0 #b9a9e0;}
.choice.right{background:linear-gradient(180deg,#7dffb0,var(--green)); box-shadow:0 5px 0 #1f9e58; color:#053b1c; animation:rightPop .4s;}
.choice.wrong{background:linear-gradient(180deg,#ff9aa6,var(--red)); box-shadow:0 5px 0 #a8071a; color:#3b0008; animation:wrongShake .4s;}
.choice:disabled{cursor:default;}
@keyframes rightPop{40%{transform:scale(1.07)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* Overlays */
.overlay{position:fixed; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; padding:16px;
  background:radial-gradient(circle at 50% 40%,rgba(40,20,80,.85),rgba(8,5,20,.96)); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);}
.overlay.hide{display:none;}
.panel{width:100%; max-width:420px; text-align:center; border-radius:20px; padding:24px 18px;
  background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.03)); border:2px solid var(--line);
  box-shadow:0 24px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.15); animation:panelIn .4s;}
@keyframes panelIn{0%{opacity:0;transform:translateY(18px) scale(.95)}100%{opacity:1}}
.panel h2{font-family:var(--pixel); font-size:14px; color:var(--gold); margin:0 0 14px; line-height:1.7; text-shadow:2px 2px 0 #6a3d00;}
.vsrow{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px;}
.vsrow img{width:62px; height:62px; border-radius:50%; object-fit:cover; object-position:center top;}
.vsrow .a{border:3px solid var(--blue);} .vsrow .b{border:3px solid var(--pink);}
.vsrow span{font-family:var(--pixel); font-size:14px; color:var(--gold);}
.rules{text-align:left; font-size:14px; line-height:1.85; color:var(--ink); margin:0 auto 14px; max-width:330px;}
.rules .lion{color:var(--blue-glow); font-weight:700;} .rules .bun{color:var(--pink-glow); font-weight:700;}
.rules small{color:var(--muted);}
.toggle{display:flex; align-items:center; justify-content:center; gap:10px; margin:4px 0 16px; font-size:14px; color:var(--muted);}
.switch{position:relative; width:52px; height:28px;}
.switch input{display:none;}
.slider{position:absolute; inset:0; border-radius:99px; background:#4a3a6a; transition:.2s; border:1px solid var(--line); cursor:pointer;}
.slider::before{content:""; position:absolute; width:22px; height:22px; border-radius:50%; left:3px; top:2px; background:#fff; transition:.2s;}
.switch input:checked + .slider{background:var(--green);}
.switch input:checked + .slider::before{transform:translateX(24px);}
.btn{font-family:var(--pixel); font-size:12px; letter-spacing:1px; color:#3b0030; padding:16px 22px; border:none; border-radius:13px; cursor:pointer;
  background:linear-gradient(180deg,var(--gold),var(--gold-2)); box-shadow:0 6px 0 #8a5200,0 10px 16px rgba(0,0,0,.4); transition:transform .08s,box-shadow .08s; margin:4px;}
.btn:active{transform:translateY(5px); box-shadow:0 1px 0 #8a5200;}
.winface{width:96px; height:96px; border-radius:50%; object-fit:cover; object-position:center top; margin:2px auto 8px; display:block; animation:bob 1s ease-in-out infinite; filter:drop-shadow(0 8px 10px rgba(0,0,0,.5));}
.finalscore{font-family:var(--pixel); font-size:11px; color:var(--muted); margin:6px 0 12px; line-height:1.8;}
.finalscore b{color:var(--ink); font-size:14px;}
.chore{font-size:18px; font-weight:700; margin:6px auto 16px; padding:13px; border-radius:13px; max-width:300px;
  background:rgba(255,210,74,.12); border:2px dashed var(--gold);}
.chore .big{font-size:24px; color:var(--gold);}
.confetti{position:fixed; top:-12px; width:9px; height:14px; z-index:25; opacity:.9; pointer-events:none;}
.musicbtn{position:fixed; top:10px; right:10px; z-index:40; width:44px; height:44px; border-radius:50%;
  border:2px solid var(--line); background:rgba(20,12,40,.72); color:var(--gold); font-size:20px; cursor:pointer;
  -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); box-shadow:0 4px 12px rgba(0,0,0,.4); transition:transform .1s;}
.musicbtn:active{transform:scale(.9);}
.musicbtn.off{color:var(--muted);}

@media(max-width:360px){
  .fighter{padding:8px 5px 10px;}
  .choice{font-size:15px; min-height:52px; padding:12px 6px;}
  .school{font-size:10px;}
}
</style>
</head>
<body>
<button class="musicbtn" id="musicBtn" title="背景音樂">🔊</button>
<div class="wrap">
  <div class="titlebar">
    <h1>家事單字決鬥王</h1>
    <div class="sub">VOCAB DUEL ⚔ BEST OF 12</div>
  </div>

  <div class="arena" id="arena">
    <div class="fighters">
      <div class="fighter A active" id="fA">
        <img class="avatar" id="avA" alt="Hanson">
        <div class="nm">HANSON</div>
        <div class="school">🏫 成功高中代表</div>
        <div class="score-lbl">SCORE</div>
        <div class="score zero" id="scoreA">0</div>
        <div class="fx" id="fxA"></div>
      </div>
      <div class="vs">VS</div>
      <div class="fighter B" id="fB">
        <img class="avatar" id="avB" alt="Amber">
        <div class="nm">AMBER</div>
        <div class="school">🏫 北成國小<br>四年級代表</div>
        <div class="score-lbl">SCORE</div>
        <div class="score zero" id="scoreB">0</div>
        <div class="fx" id="fxB"></div>
      </div>
    </div>

    <div class="qcard">
      <div class="progress">
        <span class="num" id="progNum">第 1 / 12 題</span>
        <span class="pips" id="pips"></span>
      </div>
      <div class="turn-tag" id="turnTag">　</div>
      <div class="word" id="word">READY</div>
      <div class="timer" id="timer"><div class="timerfill" id="timerfill"></div></div>
      <div class="choices" id="choices"></div>
    </div>
  </div>
</div>

<!-- Start -->
<div class="overlay" id="startScreen">
  <div class="panel">
    <h2>⚔ 準備對決 ⚔</h2>
    <div class="vsrow">
      <img class="a" id="vsA" alt="Hanson"><span>VS</span><img class="b" id="vsB" alt="Amber">
    </div>
    <div class="rules">
      🦁 <span class="lion">Hanson</span>｜成功高中代表<br>　　國中 40% ＋ 高中 60%<br>
      🐰 <span class="bun">Amber</span>｜北成國小四年級代表<br>　　國中 100%<br>
      全場 <b>12 題</b>，兩人輪流各 6 題。<br>
      從 <b>0 分</b>開始：答對 <b>+1</b>、答錯 <b>−1</b>（分數可為負）。<br>
      12 題後分數高者獲勝；平手進入 <b>🔥 驟死賽</b>。<br>
      <small>＊輸的人要做一項家事</small>
    </div>
    <div class="toggle">
      <span>⏱ 計時模式</span>
      <label class="switch"><input type="checkbox" id="timerToggle" checked><span class="slider"></span></label>
    </div>
    <button class="btn" id="startBtn">▶ 開始決鬥</button>
  </div>
</div>

<!-- Win -->
<div class="overlay hide" id="winScreen">
  <div class="panel">
    <img class="winface" id="winFace" alt="winner">
    <h2 id="winTitle">獲勝！</h2>
    <div class="finalscore" id="finalScore"></div>
    <div class="chore" id="choreBox"></div>
    <button class="btn" id="rematchBtn">↻ 再來一場</button>
  </div>
</div>

/* 音效 */
let AC=null;
function initAudio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } }
function beep(f,d,t="square",v=0.18,w=0){ if(!AC)return; const s=AC.currentTime+w,o=AC.createOscillator(),g=AC.createGain();
  o.type=t;o.frequency.setValueAtTime(f,s);o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(v,s+0.012);g.gain.exponentialRampToValueAtTime(0.0001,s+d);
  o.start(s);o.stop(s+d+0.02); }

function sWin(){[523,659,784,1047,784,1047,1319].forEach((f,i)=>beep(f,0.18,"square",0.16,i*0.12));}

/* ===== 背景音樂：原創 8-bit 遊樂園風循環（碰碰車 / oompah 蹦恰節奏） ===== */
let bgmGain=null, noiseBuf=null, bgmTimer=null, bgmNext=0, bgmStep=0, bgmMuted=false;
const BGM_STEP=60/150/4;                 // 150 BPM 的 16 分音符
const LEAD=[                             // 原創主旋律（32 步 / 2 小節）
  659.25,null,523.25,null,440.00,null,523.25,null,
  698.46,null,523.25,null,440.00,null,349.23,null,
  523.25,null,659.25,null,783.99,null,659.25,null,
  587.33,null,493.88,null,392.00,null,587.33,null
];
const BASS=[110.00,87.31,130.81,98.00];  // 每半小節根音：Am F C G
const STABS=[                            // 對應和弦點
  [220.00,261.63,329.63],[174.61,220.00,261.63],
  [261.63,329.63,392.00],[196.00,246.94,293.66]
];
function ensureBgmGain(){ if(!bgmGain){ bgmGain=AC.createGain(); bgmGain.gain.value=bgmMuted?0:0.10; bgmGain.connect(AC.destination); } }
function bgmTone(f,d,type,v,t){ const o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t); o.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(v,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.start(t); o.stop(t+d+0.02); }
function makeNoise(){ const len=Math.floor(AC.sampleRate*0.2); noiseBuf=AC.createBuffer(1,len,AC.sampleRate);
  const d=noiseBuf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1; }
function hat(t,v){ const s=AC.createBufferSource(); s.buffer=noiseBuf;
  const hp=AC.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=7000;
  const g=AC.createGain(); s.connect(hp); hp.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.05); s.start(t); s.stop(t+0.07); }
function bgmPlayStep(i,t){
  const half=Math.floor(i/8);                                   // 0..3
  if(LEAD[i]) bgmTone(LEAD[i],BGM_STEP*1.7,"square",0.085,t);   // 主旋律
  if(i%4===0) bgmTone(BASS[half],BGM_STEP*2,"triangle",0.16,t); // 低音「蹦」
  if(i%4===2) STABS[half].forEach(f=>bgmTone(f,BGM_STEP*0.9,"square",0.05,t)); // 和弦「恰」
  hat(t, i%4===2?0.05:0.03);                                    // 輕節奏
}
function bgmSchedule(){ while(bgmNext < AC.currentTime+0.12){ bgmPlayStep(bgmStep,bgmNext); bgmNext+=BGM_STEP; bgmStep=(bgmStep+1)%LEAD.length; } }
function startBGM(){ if(!AC||bgmTimer) return; ensureBgmGain(); makeNoise(); bgmNext=AC.currentTime+0.08; bgmStep=0; bgmTimer=setInterval(bgmSchedule,25); }
function stopBGM(){ clearInterval(bgmTimer); bgmTimer=null; }
function toggleMusic(){
  initAudio(); ensureBgmGain();
  bgmMuted=!bgmMuted; bgmGain.gain.value=bgmMuted?0:0.10;
  const b=$("musicBtn"); b.textContent=bgmMuted?"🔇":"🔊"; b.classList.toggle("off",bgmMuted);
  if(!bgmMuted && !bgmTimer) startBGM();
}
$("musicBtn").addEventListener("click",toggleMusic);

/* 出題 */
function pickWord(){
  const s=WORD_BANK.settings[P[turn].key]||{senior_ratio:0};
  const useSenior=WORD_BANK.seniorWords.length && Math.random()<(s.senior_ratio||0);
  return rand(useSenior?WORD_BANK.seniorWords:WORD_BANK.juniorWords);
}
function buildChoices(q){
  const all=[...WORD_BANK.juniorWords,...WORD_BANK.seniorWords,...(WORD_BANK.cities||[])];
  const o=[q.meaning]; let g=0;
  while(o.length<4 && g++<300){ const w=rand(all).meaning; if(!o.includes(w))o.push(w); }
  return o.sort(()=>Math.random()-0.5);
}
function paintProgress(){
  if(sd){ $("progNum").textContent="🔥 驟死賽 第 "+(qNo-TOTAL+1)+" 題"; $("pips").innerHTML=""; return; }
  $("progNum").textContent="第 "+(qNo+1)+" / "+TOTAL+" 題";
  let h=""; for(let i=0;i<TOTAL;i++){ h+='<span class="pip'+(i<qNo?' done':(i===qNo?' now':''))+'"></span>'; }
  $("pips").innerHTML=h;
}
function paintTurn(){
  $("fA").classList.toggle("active",turn==="A");
  $("fB").classList.toggle("active",turn==="B");
  $("turnTag").innerHTML = turn==="A"
    ? '🦁 <b class="A">Hanson</b> 的回合 — 翻譯這個字！'
    : '🐰 <b class="B">Amber</b> 的回合 — 翻譯這個字！';
}
function newQuestion(){
  current=pickWord();
  const w=$("word"); w.textContent=current.word;
  w.style.animation="none"; void w.offsetWidth; w.style.animation="";
  const box=$("choices"); box.innerHTML="";
  buildChoices(current).forEach(txt=>{
    const b=document.createElement("button");
    b.className="choice"; b.textContent=txt;
    b.addEventListener("click",()=>answer(b,txt));
    box.appendChild(b);
  });
  paintTurn(); paintProgress(); startTimer(); busy=false;
}

/* 計時 */
function startTimer(){
  const f=$("timerfill"),wrap=$("timer");
  if(!timerOn){ wrap.classList.add("hidden"); return; }
  wrap.classList.remove("hidden");
  f.style.animation="none"; f.classList.remove("run"); void f.offsetWidth;
  f.style.animationDuration=(QTIME/1000)+"s"; f.classList.add("run");
  clearTimeout(toTimer); toTimer=setTimeout(()=>{ if(!busy) answer(null,"__timeout__"); },QTIME);
}
function stopTimer(){ clearTimeout(toTimer); $("timerfill").classList.remove("run"); $("timerfill").style.animation="none"; }

/* 計分顯示 */
function paintScore(k){
  const el=$("score"+k), v=score[k];
  el.textContent=(v>0?"+":"")+v;
  el.className="score "+(v>0?"pos":v<0?"neg":"zero")+" bump";
  el.style.animation="none"; void el.offsetWidth; el.style.animation="";
}
function floatFx(k,text,dir){
  const el=document.createElement("div");
  el.className="pop "+dir; el.textContent=text;
  $("fx"+k).appendChild(el); setTimeout(()=>el.remove(),1100);
}

/* 作答 */
function answer(btn,value){
  if(busy)return; busy=true; stopTimer();
  const me=turn, timeout=value==="__timeout__";
  const correct=!timeout && value===current.meaning;

  [...$("choices").children].forEach(b=>{
    b.disabled=true;
    if(b.textContent===current.meaning) b.classList.add("right");
    else if(btn&&b===btn) b.classList.add("wrong");
  });

  if(correct){
    score[me]+=1; paintScore(me);
    floatFx(me,"+1","up");
    $("f"+me).classList.add("correct");
    sRight();
  }else{
    score[me]-=1; paintScore(me);
    floatFx(me, timeout?"⏱ −1":"−1","down");
    $("f"+me).classList.add("wrongf");
    $("arena").classList.add("shake");
    sWrong();
  }

  setTimeout(()=>{
    $("f"+me).classList.remove("correct","wrongf");
    $("arena").classList.remove("shake");
    qNo++;
    // 結束判定
    if(qNo>=TOTAL && qNo%2===0 && score.A!==score.B){ endGame(score.A>score.B?"A":"B"); return; }
    if(qNo===TOTAL && score.A===score.B){ sd=true; }
    turn=other(turn);
    newQuestion();
  },1000);
}

/* 勝負 */
function endGame(winner){
  busy=true; stopTimer(); stopBGM();
  const loser=other(winner);
  const wName=winner==="A"?"Hanson":"Amber";
  const lName=loser==="A"?"Hanson":"Amber";
  const chore=rand(CHORES);
  $("winFace").src=IMG[winner];
  $("winFace").style.border="4px solid "+(winner==="A"?"var(--blue)":"var(--pink)");
  $("winTitle").innerHTML="🏆 "+wName+" 獲勝！";
  $("finalScore").innerHTML="最終比分　🦁 Hanson <b>"+fmt(score.A)+"</b>　：　<b>"+fmt(score.B)+"</b> Amber 🐰";
  $("choreBox").innerHTML="指定 <b>"+lName+"</b> 去做<br><span class='big'>🧹 "+chore+" ✕1</span>";
  $("winScreen").classList.remove("hide");
  sWin(); confetti();
}
const fmt=v=>(v>0?"+":"")+v;

function confetti(){
  const cols=["#ffd24a","#3da9ff","#ff5fa2","#46e08a","#fff"];
  for(let i=0;i<70;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=Math.random()*100+"vw"; c.style.background=cols[i%cols.length];
    c.style.transform="rotate("+Math.random()*360+"deg)"; document.body.appendChild(c);
    const dur=2200+Math.random()*1800, drift=Math.random()*200-100;
    c.animate([{transform:"translate(0,0) rotate(0)",opacity:1},{transform:"translate("+drift+"px,105vh) rotate(720deg)",opacity:.9}],{duration:dur,easing:"cubic-bezier(.3,.6,.5,1)"});
    setTimeout(()=>c.remove(),dur);
  }
}

/* 開始 / 重來 */
function resetState(){
  score={A:0,B:0}; turn="A"; qNo=0; sd=false; busy=false; current=null;
  paintScore("A"); paintScore("B"); $("scoreA").classList.remove("bump"); $("scoreB").classList.remove("bump");
}
function begin(){
  initAudio(); timerOn=$("timerToggle").checked;
  resetState();
  $("startScreen").classList.add("hide"); $("winScreen").classList.add("hide");
  startBGM();
  newQuestion();
}
$("startBtn").addEventListener("click",()=>{ sClick(); begin(); });
$("rematchBtn").addEventListener("click",()=>{ sClick(); $("winScreen").classList.add("hide"); $("startScreen").classList.remove("hide"); });

/* 初始：載入人像 */
$("avA").src=IMG.A; $("avB").src=IMG.B; $("vsA").src=IMG.A; $("vsB").src=IMG.B;
paintScore("A"); paintScore("B"); paintProgress();
</script>
