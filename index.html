<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家事單字決鬥王 v2.0</title>
<style>
body{font-family:Arial,"Microsoft JhengHei";margin:0;padding:12px;background:linear-gradient(#8fd3ff,#ffd6e7);}
.card{background:#fff;border-radius:16px;padding:12px;margin:8px 0;}
.activeA{border:4px solid #4da3ff;}
.activeB{border:4px solid #ff7eb2;}
.word{font-size:2rem;font-weight:bold;text-align:center}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{padding:14px;border:none;border-radius:12px;font-size:1rem}
.turn{text-align:center;font-size:1.2rem;font-weight:bold}
</style>
</head>
<body>

<div class="card">
<h2>🏆 家事單字決鬥王</h2>
🦁 Hanson：國中40% + 高中60%<br>
🐰 Amber：國中100%<br>
先取得❤️10獲勝
</div>

<div id="A" class="card activeA">
🦁 Hanson
<div id="hpA">❤️❤️❤️❤️❤️</div>
</div>

<div id="B" class="card">
🐰 Amber
<div id="hpB">❤️❤️❤️❤️❤️</div>
</div>

<div id="turn" class="turn">載入中...</div>

<div class="card word" id="word"></div>

<div class="choices" id="choices"></div>

<script>
let bank=null;
let turn="A";
let hpA=5,hpB=5;
let current=null;

function hearts(n){
 return "❤️".repeat(Math.max(0,n));
}

function rand(arr){
 return arr[Math.floor(Math.random()*arr.length)];
}

async function loadWordBank(){
 const res=await fetch("words.json");
 bank=await res.json();
 startGame();
}

function getQuestion(){

 if(turn==="A"){
   if(Math.random()<0.4){
      current=rand(bank.juniorWords);
   }else{
      current=rand(bank.seniorWords);
   }
 }else{
   current=rand(bank.juniorWords);
 }

 showQuestion();
}

function showQuestion(){

 document.getElementById("word").innerText=current.word;

 let pool=[];

 if(current.meaning){
   pool.push(current.meaning);
 }

 while(pool.length<4){

   let source=[
     ...bank.juniorWords,
     ...bank.seniorWords,
     ...(bank.cities||[])
   ];

   let wrong=rand(source).meaning;

   if(!pool.includes(wrong)){
      pool.push(wrong);
   }
 }

 pool.sort(()=>Math.random()-0.5);

 document.getElementById("choices").innerHTML=pool.map(
 x=>`<button onclick="answer('${x.replace(/'/g,"")}')">${x}</button>`
 ).join("");
}

function updateTurn(){

 document.getElementById("A").className="card";
 document.getElementById("B").className="card";

 if(turn==="A"){
   document.getElementById("A").classList.add("activeA");
   document.getElementById("turn").innerText="🟦 Hanson 回合";
 }else{
   document.getElementById("B").classList.add("activeB");
   document.getElementById("turn").innerText="🩷 Amber 回合";
 }
}

function answer(v){

 const ok=(v===current.meaning);

 if(turn==="A"){
   hpA += ok ? 1 : -1;
   document.getElementById("hpA").innerText=hearts(hpA);
 }else{
   hpB += ok ? 1 : -1;
   document.getElementById("hpB").innerText=hearts(hpB);
 }

 if(hpA>=10){
   alert("🏆 Hanson獲勝！\n🍽️ 指定Amber洗碗一次");
   location.reload();
 }

 if(hpB>=10){
   alert("🏆 Amber獲勝！\n🍽️ 指定Hanson洗碗一次");
   location.reload();
 }

 if(hpA<=0){
   alert("😭 Hanson失敗！\n🧺 洗衣服一次");
   location.reload();
 }

 if(hpB<=0){
   alert("😭 Amber失敗！\n🧺 洗衣服一次");
   location.reload();
 }

 turn=(turn==="A")?"B":"A";
 updateTurn();
 getQuestion();
}

function startGame(){
 updateTurn();
 getQuestion();
}

loadWordBank();
</script>

</body>
</html>
